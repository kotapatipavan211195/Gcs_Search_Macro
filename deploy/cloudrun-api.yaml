apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gcs-search-api
  annotations:
    # The service URL is not a public application endpoint. Reach it only via
    # the HTTPS load balancer where IAP and VPN-source policy are enforced.
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      serviceAccountName: gcs-search-api@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: IMAGE_URI
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: APP_ENV
              value: production
            - name: GOOGLE_CLOUD_PROJECT
              value: PROJECT_ID
            - name: GCS_SEARCH_REPORTS_BUCKET
              value: REPORTS_BUCKET
            - name: GCS_SEARCH_TASKS_LOCATION
              value: REGION
            - name: GCS_SEARCH_TASKS_QUEUE
              value: gcs-search-jobs
            - name: GCS_SEARCH_WORKER_URL
              value: WORKER_URL
            - name: GCS_SEARCH_TASK_SERVICE_ACCOUNT
              value: gcs-search-tasks@PROJECT_ID.iam.gserviceaccount.com
            - name: GCS_SEARCH_ALLOWED_EMAIL_DOMAINS
              value: YOUR_ORG_DOMAIN
            # Configure this JSON through Secret Manager in real deployment;
            # both services read the same administrator-owned policy secret.
            - name: GCS_SEARCH_SCOPE_POLICIES_JSON
              valueFrom:
                secretKeyRef:
                  name: gcs-search-scope-policies
                  key: latest
